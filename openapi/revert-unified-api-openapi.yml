  /crm/notes/{id}:
    get:
      operationId: getCrmNote
      summary: Get CRM Note
      description: Get details of a specific CRM note by ID
      tags:
        - CRM Notes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ApiVersion'
        - $ref: '#/components/parameters/Fields'
      responses:
        '200':
          description: Note details
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    $ref: '#/components/schemas/ResponseStatus'
                  result:
                    $ref: '#/components/schemas/Note'
        '401':
          description: Unauthorized
    patch:
      operationId: updateCrmNote
      summary: Update CRM Note
      description: Update an existing CRM note
      tags:
        - CRM Notes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ApiVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Note'
      responses:
        '200':
          description: Note updated
        '401':
          description: Unauthorized
  /crm/notes:
    get:
      operationId: getCrmNotes
      summary: List CRM Notes
      description: Get all CRM notes with pagination
      tags:
        - CRM Notes
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ApiVersion'
        - $ref: '#/components/parameters/Fields'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: List of notes
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      results:
                        type: array
                        items:
                          $ref: '#/components/schemas/Note'
        '401':
