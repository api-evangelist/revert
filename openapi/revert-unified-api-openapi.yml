                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      results:
                        type: array
                        items:
                          $ref: '#/components/schemas/Company'
        '401':
          description: Unauthorized
    post:
      operationId: createCrmCompany
      summary: Create CRM Company
      description: Create a new CRM company/account
      tags:
