openapi: 3.0.3
info:
  title: Revert Unified API
  description: >-
    Revert is an open-source unified API platform that makes it easy to build
    integrations with third-party services including CRMs (Salesforce, HubSpot,
    Zoho CRM, Pipedrive, Close CRM), ticketing systems (Jira, Asana), accounting
    (Xero, QuickBooks), chat (Slack, Microsoft Teams, Discord), and more — all
    through a single standardized API.
  version: 1.0.0
  contact:
    url: https://www.revert.dev/
  license:
    name: AGPL-3.0
    url: https://github.com/revertinc/revert/blob/main/LICENSE.txt
servers:
  - url: https://api.revert.dev
    description: Production
  - url: https://api-staging.revert.dev
    description: Staging
tags:
  - name: Connections
    description: Manage third-party OAuth connections and webhooks
  - name: CRM Contacts
    description: Unified CRM contact operations across Salesforce, HubSpot, Zoho, Pipedrive, and Close
  - name: CRM Companies
    description: Unified CRM company/account operations
  - name: CRM Deals
    description: Unified CRM deal/opportunity operations
  - name: CRM Leads
    description: Unified CRM lead operations
  - name: CRM Notes
    description: Unified CRM note operations
  - name: CRM Tasks
    description: Unified CRM task operations
  - name: CRM Events
    description: Unified CRM event/activity operations
  - name: CRM Users
    description: Unified CRM user operations
  - name: CRM Properties
    description: Unified CRM custom property operations
  - name: Tickets
    description: Unified ticketing operations across Jira and Asana
  - name: Chat
    description: Unified chat operations across Slack, Microsoft Teams, and Discord
  - name: Accounting
    description: Unified accounting operations across Xero and QuickBooks
security:
  - ApiTokenAuth: []
components:
  securitySchemes:
    ApiTokenAuth:
      type: apiKey
      in: header
      name: x-revert-api-token
      description: Your official API key for accessing Revert APIs
  parameters:
    TenantId:
      name: x-revert-t-id
      in: header
      required: true
      schema:
        type: string
      description: The unique customer id used when the customer linked their account
    ApiVersion:
      name: x-api-version
      in: header
      required: false
      schema:
        type: string
      description: Optional Revert API version. Defaults to latest if missing
    Fields:
      name: fields
      in: query
      required: false
      schema:
        type: string
      description: Comma-separated list of fields to include in response
    PageSize:
      name: pageSize
      in: query
      required: false
      schema:
        type: string
      description: Number of results per page
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
      description: Pagination cursor for next/previous page
    Associations:
      name: associations
      in: query
      required: false
      schema:
        type: string
      description: Comma-separated list of associated objects to include
  schemas:
    ResponseStatus:
      type: string
      enum:
        - ok
        - error
    Contact:
      type: object
      properties:
        id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        company:
          type: string
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        remoteId:
          type: string
        additional:
          type: object
          description: Non-unified fields from the source CRM
    Company:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        website:
          type: string
        industry:
          type: string
        numberOfEmployees:
          type: integer
        phone:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        remoteId:
          type: string
        additional:
          type: object
    Deal:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        amount:
          type: number
        currency:
          type: string
        stage:
          type: string
        probability:
          type: number
        closeDate:
          type: string
          format: date
        ownerId:
          type: string
        contactId:
          type: string
        companyId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        remoteId:
          type: string
        additional:
          type: object
    Lead:
      type: object
      properties:
        id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        company:
          type: string
        source:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        remoteId:
          type: string
        additional:
          type: object
    Note:
      type: object
      properties:
        id:
          type: string
        content:
          type: string
        contactId:
          type: string
        dealId:
          type: string
        companyId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        remoteId:
          type: string
        additional:
          type: object
    Task:
      type: object
      properties:
        id:
          type: string
        subject:
          type: string
        description:
          type: string
        dueDate:
          type: string
          format: date
        status:
          type: string
        priority:
          type: string
        ownerId:
          type: string
        contactId:
          type: string
        dealId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        remoteId:
          type: string
        additional:
          type: object
    Event:
      type: object
      properties:
        id:
          type: string
        subject:
          type: string
        description:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        location:
          type: string
        contactId:
          type: string
        dealId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        remoteId:
          type: string
        additional:
          type: object
    User:
      type: object
      properties:
        id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        role:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        remoteId:
          type: string
    Ticket:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        status:
          type: string
        priority:
          type: string
        assigneeId:
          type: string
        collectionId:
          type: string
        dueDate:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        remoteId:
          type: string
        additional:
          type: object
    TicketCollection:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        remoteId:
          type: string
    ChatChannel:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        type:
          type: string
        memberCount:
          type: integer
        remoteId:
          type: string
    ChatMessage:
      type: object
      properties:
        id:
          type: string
        text:
          type: string
        channelId:
          type: string
        userId:
          type: string
        createdAt:
          type: string
          format: date-time
        remoteId:
          type: string
    AccountingAccount:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        balance:
          type: number
        currency:
          type: string
        remoteId:
          type: string
    Connection:
      type: object
      properties:
        tp_id:
          type: string
          description: Third-party provider ID (e.g., hubspot, salesforce)
        t_id:
          type: string
          description: Tenant ID
        tp_customer_id:
          type: string
        tp_account_url:
          type: string
        createdAt:
          type: string
          format: date-time
    PaginatedResponse:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/ResponseStatus'
        next:
          type: string
          description: Cursor for next page
        previous:
          type: string
          description: Cursor for previous page
    ErrorResponse:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/ResponseStatus'
        message:
          type: string
        error:
          type: string
paths:
  /connection:
    get:
      operationId: getConnection
      summary: Get Connection Details
      description: Get details of a connection for a specific tenant
      tags:
        - Connections
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ApiVersion'
      responses:
        '200':
          description: Connection details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Connection'
        '401':
          description: Unauthorized
        '404':
          description: Not found
  /connection/webhook:
    post:
      operationId: createConnectionWebhook
      summary: Create Connection Webhook
      description: Create a webhook for a tenant connection
      tags:
        - Connections
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ApiVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                webhookUrl:
                  type: string
      responses:
        '200':
          description: Webhook created
        '401':
          description: Unauthorized
    get:
      operationId: getConnectionWebhook
      summary: Get Connection Webhook
      description: Get webhook configuration for a tenant connection
      tags:
        - Connections
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ApiVersion'
      responses:
        '200':
          description: Webhook details
        '401':
          description: Unauthorized
    delete:
      operationId: deleteConnectionWebhook
      summary: Delete Connection Webhook
      description: Delete a webhook for a tenant connection
      tags:
        - Connections
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ApiVersion'
      responses:
        '200':
          description: Webhook deleted
        '401':
          description: Unauthorized
  /crm/contacts/{id}:
    get:
      operationId: getCrmContact
      summary: Get CRM Contact
      description: Get details of a specific CRM contact by ID
      tags:
        - CRM Contacts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ApiVersion'
        - $ref: '#/components/parameters/Fields'
        - $ref: '#/components/parameters/Associations'
      responses:
        '200':
          description: Contact details
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    $ref: '#/components/schemas/ResponseStatus'
                  result:
                    $ref: '#/components/schemas/Contact'
        '401':
          description: Unauthorized
        '404':
          description: Not found
    patch:
      operationId: updateCrmContact
      summary: Update CRM Contact
      description: Update an existing CRM contact
      tags:
        - CRM Contacts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ApiVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/Contact'
                - type: object
                  properties:
                    additional:
                      type: object
      responses:
        '200':
          description: Contact updated
        '401':
          description: Unauthorized
  /crm/contacts:
    get:
      operationId: getCrmContacts
      summary: List CRM Contacts
      description: Get all CRM contacts with pagination
      tags:
        - CRM Contacts
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ApiVersion'
        - $ref: '#/components/parameters/Fields'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Associations'
      responses:
        '200':
          description: List of contacts
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      results:
                        type: array
                        items:
                          $ref: '#/components/schemas/Contact'
        '401':
          description: Unauthorized
    post:
      operationId: createCrmContact
      summary: Create CRM Contact
      description: Create a new CRM contact
      tags:
        - CRM Contacts
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ApiVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/Contact'
                - type: object
                  properties:
                    additional:
                      type: object
      responses:
        '200':
          description: Contact created
        '401':
          description: Unauthorized
  /crm/contacts/search:
    post:
      operationId: searchCrmContacts
      summary: Search CRM Contacts
      description: Search CRM contacts by criteria
      tags:
        - CRM Contacts
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ApiVersion'
        - $ref: '#/components/parameters/Fields'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                searchCriteria:
                  type: object
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      results:
                        type: array
                        items:
                          $ref: '#/components/schemas/Contact'
        '401':
          description: Unauthorized
  /crm/companies/{id}:
    get:
      operationId: getCrmCompany
      summary: Get CRM Company
      description: Get details of a specific CRM company/account by ID
      tags:
        - CRM Companies
      parameters:
